<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script defer type="text/javascript" src="/eel.js"></script>
  <script type="module" src="js/main.js"></script>
  <link rel="stylesheet" href="css/style.css" />
  <title>TeleFolders</title>
</head>

<body>
  <div class="app" id="app">
    <header class="header">
      <div class="logo">
        <img src="img/custom.png" width="50" alt="logo" />
      </div>
      <div class="avatar">
        <img src="img/noncontacts.png" alt="avatar" />
        <div class="user-menu hide">
          <p class="username"></p>
          <p class="reloadChatsList" id="reloadChatsList" data-i18n="header.reload"></p>
          <p class="logout" data-i18n="header.logout"></p>
        </div>
      </div>
    </header>

    <nav class="filter-bar">
      <p class="filter-btn" data-type="archived">
        <span class="filter-icon"></span><span data-i18n="filter.archived">Archived</span>
      </p>
      <p class="filter-btn" data-type="personal">
        <span class="filter-icon"></span><span data-i18n="filter.personal">Personal Chat</span>
      </p>
      <p class="filter-btn" data-type="bot">
        <span class="filter-icon"></span><span data-i18n="filter.bots">Bots</span>
      </p>
      <p class="filter-btn" data-type="group">
        <span class="filter-icon"></span><span data-i18n="filter.group">Groups</span>
      </p>
      <p class="filter-btn" data-type="channel">
        <span class="filter-icon"></span><span data-i18n="filter.channel">Channels</span>
      </p>
    </nav>

    <main class="main">
      <div class="spinner_large">
        <div class="block"></div>
      </div>
      <div class="table-container main-table hide">
        <table class="table">
          <thead>
            <tr></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </main>
  </div>
</body>

</html>
